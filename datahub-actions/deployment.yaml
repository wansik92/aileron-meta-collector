# DataHub Actions deployment
#
# 실행 방법:
#   pip install 'acryl-datahub-actions'
#   datahub actions -c datahub-actions/deployment.yaml

name: aileron-actions

# ── DataHub GMS 연결 ──────────────────────────────────────────────────────────
datahub_api:
  server: "http://localhost:8080"
  # token: ""   # Personal Access Token (인증 활성화 시)

# ── 이벤트 소스 ───────────────────────────────────────────────────────────────
source:
  type: kafka
  config:
    connection:
      bootstrap: "localhost:9092"
      schema_registry_url: "http://localhost:8081"
    topic_routes:
      mcl: MetadataChangeLog_Versioned_v1
      pe: PlatformEvent_v1

# ── 액션 ─────────────────────────────────────────────────────────────────────
action:
  type: executor
  config:
    executor_id: default
